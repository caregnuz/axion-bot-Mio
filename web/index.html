<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝛥𝐗𝐈𝚶𝐍 𝚩𝚯𝐓</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top, rgba(0, 210, 255, 0.22), transparent 38%),
        linear-gradient(135deg, #020617, #061a33 45%, #03111f);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.container {
    width: 100%;
    max-width: 460px;
    padding: 42px 28px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(18px);
    text-align: center;
}

.badge {
    display: inline-block;
    padding: 8px 14px;
    margin-bottom: 18px;
    border-radius: 999px;
    background: rgba(0, 116, 217, 0.22);
    border: 1px solid rgba(0, 210, 255, 0.28);
    color: #8ee8ff;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

h1 {
    margin: 0;
    font-size: 44px;
    letter-spacing: 1px;
    line-height: 1.1;
}

p {
    margin: 16px auto 30px;
    max-width: 340px;
    font-size: 17px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.76);
}

.links {
    display: grid;
    gap: 14px;
}

.button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 18px;
    border-radius: 16px;
    background: linear-gradient(135deg, #0074D9, #00a8ff);
    color: white;
    text-decoration: none;
    font-size: 17px;
    font-weight: 700;
    box-shadow: 0 10px 28px rgba(0, 116, 217, 0.32);
    transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
}

.button:hover {
    transform: translateY(-3px);
    filter: brightness(1.08);
    box-shadow: 0 16px 36px rgba(0, 168, 255, 0.42);
}

.button.secondary {
    background: rgba(255, 255, 255, 0.09);
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow: none;
}

.footer {
    margin-top: 30px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.48);
}

@media (max-width: 480px) {
    .container {
        padding: 34px 22px;
    }

    h1 {
        font-size: 36px;
    }
}
</style>
</head>

<body>
<div class="container">
    <div class="badge">WhatsApp Automation</div>

    <h1>𝛥𝐗𝐈𝚶𝐍 𝚩𝚯𝐓</h1>
    <p>Il tuo bot WhatsApp potente, elegante e intelligente.</p>

    <div class="links">
        <a class="button" href="https://github.com/axion-bot/axion-bot-Md" target="_blank">
            🔗 GitHub
        </a>

        <a class="button secondary" href="https://whatsapp.com/channel/0029Vb8MQ3U1CYoMEtU1832d" target="_blank">
            📢 Canale WhatsApp
        </a>

        <a class="button secondary" href="https://wa.me/212620098100" target="_blank">
            💬 Contatta il Bot
        </a>
    </div>

    <div class="footer">
        © 2026 AXION BOT
    </div>
</div>
</body>
</html>
